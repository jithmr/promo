<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Image Tool PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

<style>
:root { --bg:#fff; --text:#000; --card:#f2f2f2; }
.dark { --bg:#121212; --text:#fff; --card:#1e1e1e; }

body {
  font-family: Arial;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

.container { max-width:900px; margin:auto; }

.card {
  background:var(--card);
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

canvas {
  max-width:100%;
  border:1px solid #aaa;
  cursor:crosshair;
}

button, input, select {
  margin:5px;
  padding:8px;
}

#exifData {
  text-align:left;
  font-size:12px;
  max-height:200px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="container">
<h2>🔥 Ultimate Image Tool PRO</h2>

<button onclick="toggleDark()">🌙 Dark Mode</button>

<div class="card">
<input type="file" id="upload" accept="image/*"><br>

Aspect Ratio:
<select id="aspect">
<option value="free">Free</option>
<option value="1">1:1</option>
<option value="1.777">16:9</option>
</select><br>

Brightness <input type="range" id="brightness" min="0" max="200" value="100"><br>
Contrast <input type="range" id="contrast" min="0" max="200" value="100"><br>
Saturation <input type="range" id="saturation" min="0" max="200" value="100"><br>

<button onclick="applyFilters()">Apply Filters</button>
<button onclick="process()">Crop & Export</button>
</div>

<canvas id="canvas"></canvas>

<div class="card">
<h3>📷 EXIF Data</h3>
<div id="exifData"></div>
</div>

</div>

<script>
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let img = new Image();

// Crop box
let crop = {x:50,y:50,w:200,h:200};
let dragging = false;
let resizing = false;

// Upload
document.getElementById("upload").addEventListener("change", e=>{
  let file = e.target.files[0];

  let reader = new FileReader();
  reader.onload = ev=>{
    img.onload = ()=>{
      canvas.width = img.width;
      canvas.height = img.height;
      draw();
    };
    img.src = ev.target.result;

    // EXIF
    EXIF.getData(file, function(){
      let allMeta = EXIF.getAllTags(this);
      let html = "";
      for(let key in allMeta){
        html += `<b>${key}</b>: ${allMeta[key]}<br>`;
      }
      document.getElementById("exifData").innerHTML = html || "No EXIF data";
    });
  };
  reader.readAsDataURL(file);
});

// Draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.filter = `brightness(${brightness.value}%) contrast(${contrast.value}%) saturate(${saturation.value}%)`;
  ctx.drawImage(img,0,0);

  // Crop box
  ctx.strokeStyle="red";
  ctx.lineWidth=2;
  ctx.strokeRect(crop.x,crop.y,crop.w,crop.h);
}

// Filters
function applyFilters(){
  draw();
}

// Crop interaction
canvas.onmousedown = e=>{
  let x=e.offsetX,y=e.offsetY;

  if(x>crop.x && x<crop.x+crop.w && y>crop.y && y<crop.y+crop.h){
    dragging=true;
  }
};

canvas.onmousemove = e=>{
  if(dragging){
    crop.x = e.offsetX - crop.w/2;
    crop.y = e.offsetY - crop.h/2;
    draw();
  }
};

canvas.onmouseup = ()=> dragging=false;

// Process
function process(){
  let temp = document.createElement("canvas");
  temp.width = crop.w;
  temp.height = crop.h;

  let tctx = temp.getContext("2d");

  tctx.filter = ctx.filter;

  tctx.drawImage(
    canvas,
    crop.x,crop.y,crop.w,crop.h,
    0,0,crop.w,crop.h
  );

  let data = temp.toDataURL("image/jpeg",0.9);

  let a = document.createElement("a");
  a.href = data;
  a.download = "edited.jpg";
  a.click();
}

// Dark
function toggleDark(){
  document.body.classList.toggle("dark");
}

</script>

</body>
</html>
