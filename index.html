<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro QR & Barcode Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.container {
  background: #1e293b;
  padding: 20px;
  max-width: 420px;
  width: 100%;
  border-radius: 16px;
  text-align: center;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

h2 {
  margin-top: 0;
}

button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  font-size: 15px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
}

.secondary {
  background: #475569;
}

#reader {
  width: 100%;
  margin-top: 12px;
  position: relative;
}

.scan-frame {
  border: 2px solid #00ffcc;
  position: absolute;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 15px #00ffcc;
  animation: pulse 2s infinite;
  pointer-events: none;
}

@keyframes pulse {
  0% { box-shadow: 0 0 10px #00ffcc; }
  50% { box-shadow: 0 0 25px #00ffcc; }
  100% { box-shadow: 0 0 10px #00ffcc; }
}

#result {
  margin-top: 10px;
  word-break: break-word;
}

#history {
  margin-top: 10px;
  font-size: 13px;
  max-height: 100px;
  overflow-y: auto;
  text-align: left;
}
.history-item {
  background: #334155;
  padding: 6px;
  margin-bottom: 4px;
  border-radius: 6px;
}
a {
  color: #38bdf8;
}
</style>
</head>

<body>
<div class="container">
  <h2>Pro Code Scanner</h2>

  <button onclick="startQR()">Scan QR Code</button>
  <button onclick="startBarcode()">Scan Barcode</button>
  <button class="secondary" onclick="switchCamera()">Switch Camera</button>
  <button class="secondary" onclick="toggleTorch()">Toggle Flashlight</button>
  <button class="secondary" onclick="pauseResume()">Pause / Resume</button>
  <button class="secondary" onclick="copyResult()">Copy Result</button>
  <button class="secondary" onclick="clearResult()">Clear</button>

  <div id="reader">
    <div class="scan-frame"></div>
  </div>

  <div id="result">Idle</div>

  <div id="history"></div>
</div>

<script>
let html5QrCode;
let currentCameraId;
let camerasList = [];
let isPaused = false;
let lastResult = "";

const resultBox = document.getElementById("result");
const historyBox = document.getElementById("history");

function playBeep() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
  if (navigator.vibrate) navigator.vibrate(200);
}

function saveToHistory(text) {
  let history = JSON.parse(localStorage.getItem("scanHistory")) || [];
  history.unshift(text);
  history = history.slice(0, 10);
  localStorage.setItem("scanHistory", JSON.stringify(history));
  displayHistory();
}

function displayHistory() {
  let history = JSON.parse(localStorage.getItem("scanHistory")) || [];
  historyBox.innerHTML = "<b>Scan History:</b>";
  history.forEach(item => {
    historyBox.innerHTML += `<div class="history-item">${item}</div>`;
  });
}

function makeClickable(text) {
  const urlPattern = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
    html5QrCode = null;
  }
}

function startQR() {
  startScanner(["qr_code"]);
}

function startBarcode() {
  startScanner(["code_128","ean_13","ean_8","upc_a","upc_e"]);
}

function startScanner(formats) {
  stopScanner();
  resultBox.textContent = "Scanning...";
  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {
    camerasList = cameras;
    currentCameraId = cameras.find(c => c.label.toLowerCase().includes("back"))?.id || cameras[0].id;

    html5QrCode.start(
      currentCameraId,
      { fps: 10, qrbox: 250, formatsToSupport: formats },
      decodedText => {
        lastResult = decodedText;
        resultBox.innerHTML = "Result: " + makeClickable(decodedText);
        playBeep();
        saveToHistory(decodedText);
        stopScanner();
      }
    );
  }).catch(() => {
    resultBox.textContent = "Camera not available.";
  });
}

function switchCamera() {
  if (!camerasList.length) return;
  const index = camerasList.findIndex(c => c.id === currentCameraId);
  const nextIndex = (index + 1) % camerasList.length;
  currentCameraId = camerasList[nextIndex].id;
  startQR();
}

function toggleTorch() {
  if (html5QrCode) {
    html5QrCode.applyVideoConstraints({
      advanced: [{ torch: true }]
    }).catch(() => alert("Torch not supported"));
  }
}

function pauseResume() {
  if (!html5QrCode) return;
  if (isPaused) {
    html5QrCode.resume();
    isPaused = false;
  } else {
    html5QrCode.pause();
    isPaused = true;
  }
}

function copyResult() {
  if (!lastResult) return;
  navigator.clipboard.writeText(lastResult);
  alert("Copied!");
}

function clearResult() {
  resultBox.textContent = "Idle";
}

displayHistory();
</script>
</body>
</html>
