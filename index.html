<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Promo Automation Tool - Part 4</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<style>
body{font-family:Arial;background:#f4f4f4;padding:20px}
.container{max-width:900px;margin:auto;background:white;padding:20px;border-radius:10px}
input{width:100%;padding:8px;margin-top:4px}
button{padding:10px;margin-top:10px}
#status{white-space:pre-wrap;background:#f7f7f7;padding:15px;margin-top:15px}
</style>
</head>
<body>
<div class="container">
<h2>Promo Automation Tool - Part 4</h2>

<label>Pgm Name</label><input id="pgmName">
<label>Episode No</label><input id="epNo">
<label>TD Date (DD-MM-YY)</label><input id="tdDate">
<label>Duration</label><input id="duration">

<p><button id="sourceBtn">Select Source Folder</button> <span id="sourceName"></span></p>
<p><button id="destBtn">Select Destination Folder</button> <span id="destName"></span></p>
<p><button id="excelBtn">Select Excel Workbook</button> <span id="excelName"></span></p>

<button id="processBtn">PROCESS</button>
<div id="status">Ready...</div>
</div>

<script>
let sourceHandle=null,destHandle=null,excelHandle=null;

function log(t){document.getElementById('status').textContent=t;}

document.getElementById('sourceBtn').onclick=async()=>{
 try{sourceHandle=await window.showDirectoryPicker();sourceName.textContent=sourceHandle.name;}catch(e){}
};
document.getElementById('destBtn').onclick=async()=>{
 try{destHandle=await window.showDirectoryPicker();destName.textContent=destHandle.name;}catch(e){}
};
document.getElementById('excelBtn').onclick=async()=>{
 try{
   [excelHandle]=await window.showOpenFilePicker({
     types:[{description:'Excel',accept:{'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet':['.xlsx']}}],
     multiple:false
   });
   excelName.textContent=excelHandle.name;
 }catch(e){}
};

function isME(name){
 return /\bME\b/i.test(name.replace(/\.[^/.]+$/,''));
}
function prevDate(td){
 const [d,m,y]=td.split('-').map(Number);
 const dt=new Date(2000+y,m-1,d);
 dt.setDate(dt.getDate()-1);
 return String(dt.getDate()).padStart(2,'0')+"-"+String(dt.getMonth()+1).padStart(2,'0')+"-"+String(dt.getFullYear()).slice(-2);
}
async function fileExists(folder,name){
 try{await folder.getFileHandle(name);return true;}catch{return false;}
}
async function copyFile(srcHandle,destFolder,newName){
 const src=await srcHandle.getFile();
 const dh=await destFolder.getFileHandle(newName,{create:true});
 const w=await dh.createWritable();
 await w.write(await src.arrayBuffer());
 await w.close();
}

document.getElementById('processBtn').onclick=async()=>{
try{
const pgm=pgmName.value.trim(), ep=epNo.value.trim(), td=tdDate.value.trim(), dur=duration.value.trim();
if(!pgm||!ep||!td||!dur) return log("❌ Fill all fields");
if(!sourceHandle) return log("❌ Select Source Folder");
if(!destHandle) return log("❌ Select Destination Folder");
if(!excelHandle) return log("❌ Select Excel Workbook");

let video=null,hdsd=null,me=null;

for await(const entry of sourceHandle.values()){
 if(entry.kind!=="file") continue;
 const n=entry.name.toLowerCase();
 if(n.endsWith(".mxf")||n.endsWith(".mov")){
   if(video) return log("❌ Multiple video files found");
   video=entry;
 }
 if(n.endsWith(".wav")){
   if(isME(entry.name)) me=entry; else hdsd=entry;
 }
}

if(!video) return log("❌ No video file found");
if(!hdsd && !me) return log("❌ No WAV audio file found");

const audioFolder=await destHandle.getDirectoryHandle("Audio");
const videoFolder=await destHandle.getDirectoryHandle("Video");

const ext=video.name.substring(video.name.lastIndexOf("."));
const jobs=[];

jobs.push({folder:videoFolder,name:`${pgm}_EP_${ep}_TD_${td}_${dur} SEC${ext}`,source:video});

if(hdsd){
 jobs.push({folder:audioFolder,name:`${pgm}_EP_${ep}_TD_${td}_${dur} SEC_HD_SD TODAY.wav`,source:hdsd});
 jobs.push({folder:audioFolder,name:`${pgm}_EP_${ep}_TD_${td}_${dur} SEC_HD_SD TOMORROW.wav`,source:hdsd});
}
if(me){
 jobs.push({folder:audioFolder,name:`${pgm}_EP_${ep}_TD_${td}_${dur} SEC_ME TODAY.wav`,source:me});
 jobs.push({folder:audioFolder,name:`${pgm}_EP_${ep}_TD_${td}_${dur} SEC_ME TOMORROW.wav`,source:me});
}

for(const j of jobs){
 if(await fileExists(j.folder,j.name)) return log("❌ File already exists\n\n"+j.name);
}
for(const j of jobs){ await copyFile(j.source,j.folder,j.name); }

// Excel update
const excelFile=await excelHandle.getFile();
const data=await excelFile.arrayBuffer();
const wb=XLSX.read(data,{type:'array'});
const ws=wb.Sheets[wb.SheetNames[0]];

const prev=prevDate(td);
ws["E2"]={t:"s",v:`${pgm}_EP ${ep}_${dur} SEC_TD_${prev}`};
ws["E3"]={t:"s",v:`${pgm}_EP ${ep}_${dur} SEC_TD_${td}`};
ws["E4"]={t:"s",v:`${pgm}_EP ${ep}_${dur} SEC_TD_${prev}`};
ws["E5"]={t:"s",v:`${pgm}_EP ${ep}_${dur} SEC_TD_${td}`};
ws["E6"]={t:"s",v:`${pgm}_EP ${ep}_${dur} SEC_TD_${prev}`};
ws["E7"]={t:"s",v:`${pgm}_EP ${ep}_${dur} SEC_TD_${td}`};

const out=XLSX.write(wb,{bookType:'xlsx',type:'array'});
const writable=await excelHandle.createWritable();
await writable.write(out);
await writable.close();

log("✓ Video created\n✓ Audio files created\n✓ Excel updated\n✓ Processing completed");

}catch(err){
 log("❌ Error\n\n"+err.message);
}
};
</script>
</body>
</html>
