<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR & Barcode Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.container {
  background: #ffffff;
  max-width: 500px;
  width: 100%;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-top: 0;
}

button {
  width: 100%;
  padding: 12px;
  margin-bottom: 8px;
  font-size: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.qr-btn { background: #2563eb; }
.barcode-btn { background: #7c3aed; }
.download-btn { background: #16a34a; }

button:hover { opacity: 0.9; }

#reader {
  width: 100%;
  margin-bottom: 15px;
}

.results {
  max-height: 250px;
  overflow-y: auto;
  margin-bottom: 10px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e2e8f0;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
  font-size: 14px;
  word-break: break-all;
}

.result-row.duplicate {
  background: #fecaca;   /* Light red */
  color: #991b1b;        /* Dark red text */
}

.actions {
  display: flex;
  gap: 5px;
}

.copy-btn, .delete-btn {
  border: none;
  color: white;
  padding: 5px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}

.copy-btn { background: #1d4ed8; }
.delete-btn { background: #dc2626; }

.copy-btn:hover { opacity: 0.9; }
.delete-btn:hover { opacity: 0.9; }

</style>
</head>

<body>
<div class="container">
  <h2>QR & Barcode Scanner</h2>

  <button class="qr-btn" onclick="startQR()">Scan QR Code</button>
  <button class="barcode-btn" onclick="startBarcode()">Scan Barcode</button>

  <div id="reader"></div>

  <div class="results" id="results"></div>

  <button class="download-btn" onclick="downloadExcel()">
    Download Results as Excel
  </button>
</div>

<script>
let html5QrCode;
let scannedResults = [];
let currentFormats = [];
let lastScanTime = 0;

const resultsDiv = document.getElementById("results");

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().catch(() => {});
    html5QrCode.clear();
  }
}

function startQR() {
  currentFormats = ["qr_code"];
  startScanner();
}

function startBarcode() {
  currentFormats = [
    "code_128",
    "ean_13",
    "ean_8",
    "upc_a",
    "upc_e"
  ];
  startScanner();
}

function startScanner() {
  stopScanner();

  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {

    let backCamera = cameras.find(c =>
      c.label.toLowerCase().includes("back")
    );

    const cameraId = backCamera ? backCamera.id : cameras[0].id;

    html5QrCode.start(
      cameraId,
      {
        fps: 10,
        qrbox: 250,
        formatsToSupport: currentFormats
      },
      decodedText => {

        const now = Date.now();
        if (now - lastScanTime < 1500) return;
        lastScanTime = now;

        addResult(decodedText);
      }
    );

  }).catch(() => {
    alert("Camera not available");
  });
}

function addResult(text) {

  const isDuplicate = scannedResults.includes(text);
  scannedResults.push(text);

  const row = document.createElement("div");
  row.className = "result-row";

  if (isDuplicate) {
    row.classList.add("duplicate");
  }

  const textSpan = document.createElement("span");
  textSpan.textContent = text;

  const actions = document.createElement("div");
  actions.className = "actions";

  const copyBtn = document.createElement("button");
  copyBtn.textContent = "Copy";
  copyBtn.className = "copy-btn";
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text);
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = "Copy", 1000);
  };

  const deleteBtn = document.createElement("button");
  deleteBtn.textContent = "Delete";
  deleteBtn.className = "delete-btn";
  deleteBtn.onclick = () => {
    resultsDiv.removeChild(row);
    scannedResults = scannedResults.filter(item => item !== text);
  };

  actions.appendChild(copyBtn);
  actions.appendChild(deleteBtn);

  row.appendChild(textSpan);
  row.appendChild(actions);
  resultsDiv.appendChild(row);

  resultsDiv.scrollTop = resultsDiv.scrollHeight;
}

function downloadExcel() {
  if (scannedResults.length === 0) {
    alert("No data to export");
    return;
  }

  const worksheetData = scannedResults.map((item, index) => [
    index + 1,
    item
  ]);

  const worksheet = XLSX.utils.aoa_to_sheet([
    ["Sl No", "Scanned Result"],
    ...worksheetData
  ]);

  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Scanned Results");

  XLSX.writeFile(workbook, "scanned_results.xlsx");
}
</script>

</body>
</html>
