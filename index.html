<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced QR & Barcode Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.container {
  background: #ffffff;
  max-width: 550px;
  width: 100%;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 { text-align: center; margin-top: 0; }

.total {
  text-align: center;
  font-weight: bold;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-bottom: 8px;
  font-size: 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.qr-btn { background: #2563eb; }
.barcode-btn { background: #7c3aed; }
.download-btn { background: #16a34a; }
.clear-btn { background: #dc2626; }

button:hover { opacity: 0.9; }

#reader { width: 100%; margin-bottom: 15px; }

.results {
  max-height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e2e8f0;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
  font-size: 13px;
  gap: 5px;
}

.code-info {
  flex: 1;
}

.count {
  font-weight: bold;
  color: #2563eb;
}

.delete-btn {
  background: #dc2626;
  border: none;
  color: white;
  padding: 4px 8px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}
</style>
</head>

<body>
<div class="container">
  <h2>Advanced Scanner</h2>

  <div class="total">
    Total Scans: <span id="totalCount">0</span>
  </div>

  <button class="qr-btn" onclick="toggleQR()">Start / Stop QR Scanner</button>
  <button class="barcode-btn" onclick="toggleBarcode()">Start / Stop Barcode Scanner</button>

  <div id="reader"></div>

  <div class="results" id="results"></div>

  <button class="download-btn" onclick="downloadExcel()">Download Excel</button>
  <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<script>
let html5QrCode = null;
let scannerRunning = false;
let currentFormats = [];
let scanData = {};
let lastScanTime = 0;

const resultsDiv = document.getElementById("results");
const totalCountSpan = document.getElementById("totalCount");

function playBeep() {
  const audio = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
  audio.play();
}

function toggleQR() {
  currentFormats = ["qr_code"];
  toggleScanner();
}

function toggleBarcode() {
  currentFormats = ["code_128","ean_13","ean_8","upc_a","upc_e"];
  toggleScanner();
}

function toggleScanner() {
  if (scannerRunning) {
    stopScanner();
  } else {
    startScanner();
  }
}

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {

    let backCamera = cameras.find(c =>
      c.label.toLowerCase().includes("back")
    );

    const cameraId = backCamera ? backCamera.id : cameras[0].id;

    // 🔥 Dynamic scan frame
    let scanBox;
    if (currentFormats.includes("qr_code")) {
      scanBox = { width: 250, height: 250 }; // Square
    } else {
      scanBox = { width: 350, height: 150 }; // Rectangle for barcode
    }

    html5QrCode.start(
      cameraId,
      {
        fps: 10,
        qrbox: scanBox,
        formatsToSupport: currentFormats
      },
      decodedText => {

        const now = Date.now();
        if (now - lastScanTime < 1000) return;
        lastScanTime = now;

        playBeep();
        processScan(decodedText);
      }
    );

    scannerRunning = true;

  }).catch(() => alert("Camera not available"));
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => {
      html5QrCode.clear();
      html5QrCode = null;
      scannerRunning = false;
    });
  }
}

function processScan(text) {
  if (!scanData[text]) {
    scanData[text] = {
      count: 1,
      timestamp: new Date().toLocaleString()
    };
  } else {
    scanData[text].count++;
  }
  renderResults();
}

function renderResults() {
  resultsDiv.innerHTML = "";
  let total = 0;

  Object.keys(scanData).forEach(code => {

    total += scanData[code].count;

    const row = document.createElement("div");
    row.className = "result-row";

    const info = document.createElement("div");
    info.className = "code-info";
    info.innerHTML = `
      <div><strong>${code}</strong></div>
      <div>First Scan: ${scanData[code].timestamp}</div>
      <div class="count">Count: ${scanData[code].count}</div>
    `;

    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.className = "delete-btn";
    deleteBtn.onclick = () => {
      delete scanData[code];
      renderResults();
    };

    row.appendChild(info);
    row.appendChild(deleteBtn);
    resultsDiv.appendChild(row);
  });

  totalCountSpan.textContent = total;
}

function clearAll() {
  scanData = {};
  renderResults();
}

function downloadExcel() {
  const data = Object.keys(scanData).map((code, index) => [
    index + 1,
    code,
    scanData[code].count,
    scanData[code].timestamp
  ]);

  if (data.length === 0) {
    alert("No data to export");
    return;
  }

  const worksheet = XLSX.utils.aoa_to_sheet([
    ["Sl No", "Code", "Count", "First Scan Time"],
    ...data
  ]);

  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Scan Data");

  XLSX.writeFile(workbook, "scan_results.xlsx");
}
</script>

</body>
</html>
