<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scanner with Excel Export</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f1f5f9;
  margin: 0;
  padding: 20px;
  display: flex;
  justify-content: center;
}

.container {
  background: #ffffff;
  max-width: 500px;
  width: 100%;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-top: 0;
}

#reader {
  width: 100%;
  margin-bottom: 15px;
}

.results {
  max-height: 300px;
  overflow-y: auto;
  margin-bottom: 10px;
}

.result-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #e2e8f0;
  padding: 8px;
  margin-bottom: 6px;
  border-radius: 6px;
  font-size: 14px;
  word-break: break-all;
}

.copy-btn {
  background: #2563eb;
  border: none;
  color: white;
  padding: 5px 10px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
}

.copy-btn:hover {
  background: #1d4ed8;
}

button.download-btn {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  background: #16a34a;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button.download-btn:hover {
  background: #15803d;
}
</style>
</head>

<body>
<div class="container">
  <h2>QR & Barcode Scanner</h2>

  <div id="reader"></div>

  <div class="results" id="results"></div>

  <button class="download-btn" onclick="downloadExcel()">
    Download Results as Excel
  </button>
</div>

<script>
let html5QrCode;
let scannedResults = [];
const resultsDiv = document.getElementById("results");

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(cameras => {
    const cameraId = cameras[0].id;

    html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      decodedText => {
        if (!scannedResults.includes(decodedText)) {
          addResult(decodedText);
        }
      }
    );
  }).catch(err => {
    alert("Camera not available");
  });
}

function addResult(text) {
  scannedResults.push(text);

  const row = document.createElement("div");
  row.className = "result-row";

  const textSpan = document.createElement("span");
  textSpan.textContent = text;

  const copyBtn = document.createElement("button");
  copyBtn.textContent = "Copy";
  copyBtn.className = "copy-btn";
  copyBtn.onclick = () => {
    navigator.clipboard.writeText(text);
    copyBtn.textContent = "Copied!";
    setTimeout(() => copyBtn.textContent = "Copy", 1000);
  };

  row.appendChild(textSpan);
  row.appendChild(copyBtn);

  resultsDiv.appendChild(row);
}

function downloadExcel() {
  if (scannedResults.length === 0) {
    alert("No data to export");
    return;
  }

  const worksheetData = scannedResults.map(item => [item]);
  const worksheet = XLSX.utils.aoa_to_sheet(worksheetData);
  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, "Scanned Results");

  XLSX.writeFile(workbook, "scanned_results.xlsx");
}

startScanner();
</script>

</body>
</html>
