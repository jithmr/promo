<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadcast Promo Renamer</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f0f2f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th, td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

input{
    width:100%;
    padding:8px;
    box-sizing:border-box;
}

button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#007bff;
    color:white;
    font-size:14px;
}

button:hover{
    background:#0056b3;
}

.dropzone{
    border:3px dashed #888;
    border-radius:10px;
    padding:30px;
    text-align:center;
    margin-top:20px;
    background:#fafafa;
    transition:0.3s;
}

.dropzone.dragover{
    background:#dbeeff;
    border-color:#007bff;
}

.progress-container{
    width:100%;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-top:20px;
}

.progress-bar{
    width:0%;
    height:25px;
    background:#28a745;
    text-align:center;
    color:white;
    line-height:25px;
    transition:0.3s;
}

#log{
    margin-top:20px;
    background:black;
    color:#00ff00;
    padding:10px;
    height:250px;
    overflow:auto;
    font-family:monospace;
}

.small-btn{
    background:#dc3545;
}

.small-btn:hover{
    background:#b52b3a;
}

</style>
</head>

<body>

<div class="container">

<h1>Broadcast Promo Renamer</h1>

<button onclick="addRow()">Add Row</button>
<button onclick="selectDestinationFolder()">Select Destination Folder</button>
<button onclick="processFiles()">Rename & Save</button>

<table id="dataTable">

<thead>
<tr>
<th>Serial Name</th>
<th>Episode Number</th>
<th>Telecast Date</th>
<th>Duration</th>
<th>Remove</th>
</tr>
</thead>

<tbody>

<tr>
<td><input type="text" class="serial"></td>
<td><input type="text" class="episode"></td>
<td><input type="date" class="date"></td>
<td><input type="text" class="duration" placeholder="20SEC"></td>
<td>
<button class="small-btn" onclick="removeRow(this)">X</button>
</td>
</tr>

</tbody>
</table>

<div class="dropzone" id="dropzone">
    Drag & Drop Audio/Video Files Here
</div>

<div class="progress-container">
    <div class="progress-bar" id="progressBar">0%</div>
</div>

<div id="log"></div>

</div>

<script>

let droppedFiles = [];
let destinationDirHandle;

const dropzone = document.getElementById("dropzone");

dropzone.addEventListener("dragover", (e)=>{
    e.preventDefault();
    dropzone.classList.add("dragover");
});

dropzone.addEventListener("dragleave", ()=>{
    dropzone.classList.remove("dragover");
});

dropzone.addEventListener("drop", (e)=>{
    e.preventDefault();
    dropzone.classList.remove("dragover");

    const files = [...e.dataTransfer.files];

    droppedFiles.push(...files);

    log(`${files.length} files added.`);
});

function addRow(){

    const tbody = document.querySelector("#dataTable tbody");

    const row = document.createElement("tr");

    row.innerHTML = `
        <td><input type="text" class="serial"></td>
        <td><input type="text" class="episode"></td>
        <td><input type="date" class="date"></td>
        <td><input type="text" class="duration" placeholder="20SEC"></td>
        <td>
            <button class="small-btn" onclick="removeRow(this)">X</button>
        </td>
    `;

    tbody.appendChild(row);
}

function removeRow(btn){
    btn.parentElement.parentElement.remove();
}

async function selectDestinationFolder(){

    try{
        destinationDirHandle = await window.showDirectoryPicker();
        log("Destination folder selected.");
    }
    catch(err){
        log("Destination folder selection cancelled.");
    }
}

function log(message){

    const logBox = document.getElementById("log");

    logBox.innerHTML += message + "<br>";

    logBox.scrollTop = logBox.scrollHeight;
}

function updateProgress(current, total){

    const percent = Math.round((current / total) * 100);

    const progressBar = document.getElementById("progressBar");

    progressBar.style.width = percent + "%";

    progressBar.innerText = percent + "%";
}

async function saveFile(folderHandle, filename, file){

    const fileHandle =
        await folderHandle.getFileHandle(filename, {create:true});

    const writable =
        await fileHandle.createWritable();

    await writable.write(await file.arrayBuffer());

    await writable.close();
}

async function processFiles(){

    if(!destinationDirHandle){
        alert("Please select destination folder.");
        return;
    }

    if(droppedFiles.length === 0){
        alert("Please drag files first.");
        return;
    }

    const rows = document.querySelectorAll("#dataTable tbody tr");

    if(rows.length === 0){
        alert("Please add at least one row.");
        return;
    }

    const audioFolder =
        await destinationDirHandle.getDirectoryHandle("Audio", {create:true});

    const videoFolder =
        await destinationDirHandle.getDirectoryHandle("Video", {create:true});

    const videoExtensions = ["mp4","mov","mxf","avi","mkv"];
    const audioExtensions = ["mp3","wav","aac","flac"];

    let totalOperations = droppedFiles.length * rows.length;
    let completed = 0;

    for(let r = 0; r < rows.length; r++){

        const serial =
            rows[r].querySelector(".serial").value.trim();

        const episode =
            rows[r].querySelector(".episode").value.trim();

        const date =
            rows[r].querySelector(".date").value.trim();

        const duration =
            rows[r].querySelector(".duration").value.trim();

        const baseName =
            `${serial}_EP_${episode}_PROMO_${date}_${duration}`;

        for(const file of droppedFiles){

            const extension =
                file.name.split('.').pop().toLowerCase();

            // VIDEO AUTO DETECTION
            if(videoExtensions.includes(extension)){

                const newVideoName =
                    `${baseName}.${extension}`;

                await saveFile(videoFolder, newVideoName, file);

                log(`VIDEO SAVED: ${newVideoName}`);
            }

            // AUDIO AUTO DETECTION
            else if(audioExtensions.includes(extension)){

                const todayName =
                    `${baseName}_TODAY.${extension}`;

                const tomorrowName =
                    `${baseName}_TOMORROW.${extension}`;

                await saveFile(audioFolder, todayName, file);

                await saveFile(audioFolder, tomorrowName, file);

                log(`AUDIO SAVED:
                ${todayName}
                ${tomorrowName}`);
            }

            else{
                log(`Unsupported file skipped: ${file.name}`);
            }

            completed++;

            updateProgress(completed, totalOperations);
        }
    }

    log("PROCESS COMPLETED");
}

</script>

</body>
</html>
